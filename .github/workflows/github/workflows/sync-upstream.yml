name: Sync Upstream

on:
  schedule:
    # 每天 UTC 时间 02:00 运行（北京时间 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream repository
        run: |
          git remote add upstream https://github.com/zilong7728/Collect-IPTV.git
          git fetch upstream

      - name: Merge upstream changes (main branch)
        run: |
          git checkout main
          git merge upstream/main --no-edit

      - name: Push to your fork
        run: git push origin main
